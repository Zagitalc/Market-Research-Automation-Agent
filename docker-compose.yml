services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market_research}
      POSTGRES_USER: ${POSTGRES_USER:-market_research}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-market_research}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market_research} -d ${POSTGRES_DB:-market_research}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      POSTGRES_DB: ${POSTGRES_DB:-market_research}
      POSTGRES_USER: ${POSTGRES_USER:-market_research}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-market_research}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      API_ANON_RATE: ${API_ANON_RATE:-120/min}
      RESEARCH_RUN_CREATE_RATE: ${RESEARCH_RUN_CREATE_RATE:-5/min}
      DOCUMENT_CREATE_RATE: ${DOCUMENT_CREATE_RATE:-20/min}
      AI_MOCK_MODE: ${AI_MOCK_MODE:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_LLM_MODEL: ${OPENAI_LLM_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
